<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MediBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page d-flex align-items-center justify-content-center min-vh-100">

<div class="auth-card card border-0 shadow-lg p-4" style="width:100%;max-width:420px">

  <div class="text-center mb-4">
    <div class="auth-logo mb-2">
      <i class="bi bi-hospital-fill text-primary" style="font-size:2.5rem"></i>
    </div>
    <h4 class="fw-bold mb-0">MediBook</h4>
    <p class="text-muted small">Hospital Appointment System</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-semibold">
      <i class="bi bi-box-arrow-in-right me-1"></i>Login
    </button>
  </form>

  <hr class="my-3"/>
  <p class="text-center text-muted small mb-0">
    Don't have an account?
    <a href="{{ url_for('auth.register') }}" class="fw-semibold">Register here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

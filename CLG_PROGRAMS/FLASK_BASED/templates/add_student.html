{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4">

            <!-- Header -->
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill fs-1 text-success"></i>
                <h4 class="fw-bold mt-2">Add New Student</h4>
                <p class="text-muted small mb-0">Fill in the student details below</p>
            </div>

            <!-- Add Student Form -->
            <form method="POST" action="/add_student">

                <!-- Name -->
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="name" name="name"
                               placeholder="e.g. Jane Smith">
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="jane@example.com">
                    </div>
                </div>

                <!-- Course -->
                <div class="mb-3">
                    <label for="course" class="form-label fw-semibold">Course</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-book"></i></span>
                        <input type="text" class="form-control" id="course" name="course"
                               placeholder="e.g. Computer Science">
                    </div>
                </div>

                <!-- Phone -->
                <div class="mb-4">
                    <label for="phone" class="form-label fw-semibold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control" id="phone" name="phone"
                               placeholder="+1 234 567 8900">
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <a href="/students" class="btn btn-outline-secondary w-50">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                    <button type="submit" class="btn btn-success w-50">
                        <i class="bi bi-plus-circle me-1"></i>Add Student
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — MediBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="auth-card card border-0 shadow-lg p-4" style="width:100%;max-width:460px">

  <div class="text-center mb-4">
    <i class="bi bi-person-plus-fill text-primary" style="font-size:2.5rem"></i>
    <h4 class="fw-bold mt-2 mb-0">Create Account</h4>
    <p class="text-muted small">Join MediBook as a Doctor or Patient</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.register') }}">

    <!-- Role selector — drives which extra field is shown -->
    <div class="mb-3">
      <label class="form-label fw-semibold">I am a</label>
      <div class="d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="role" id="roleDoctor"
                 value="doctor" required onchange="toggleRoleFields()"/>
          <label class="form-check-label" for="roleDoctor">
            <i class="bi bi-person-badge me-1 text-primary"></i>Doctor
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="role" id="rolePatient"
                 value="patient" onchange="toggleRoleFields()"/>
          <label class="form-check-label" for="rolePatient">
            <i class="bi bi-person-heart me-1 text-success"></i>Patient
          </label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Your full name" required/>
    </div>

    <!-- Doctor-only field -->
    <div class="mb-3 d-none" id="specField">
      <label class="form-label fw-semibold">Specialization</label>
      <input type="text" name="specialization" class="form-control" placeholder="e.g. Cardiology"/>
    </div>

    <!-- Patient-only field -->
    <div class="mb-3 d-none" id="ageField">
      <label class="form-label fw-semibold">Age</label>
      <input type="number" name="age" class="form-control" placeholder="Your age" min="1" max="120"/>
    </div>

    <!-- Email — required for all roles, used for notifications -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required/>
      </div>
      <div class="form-text">Used for appointment notifications only.</div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-at"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Confirm Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-semibold">
      <i class="bi bi-person-check me-1"></i>Create Account
    </button>
  </form>

  <hr class="my-3"/>
  <p class="text-center text-muted small mb-0">
    Already have an account?
    <a href="{{ url_for('auth.login') }}" class="fw-semibold">Login here</a>
  </p>
</div>

<script>
  function toggleRoleFields() {
    const isDoctor = document.getElementById("roleDoctor").checked;
    document.getElementById("specField").classList.toggle("d-none", !isDoctor);
    document.getElementById("ageField").classList.toggle("d-none",  isDoctor);
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
